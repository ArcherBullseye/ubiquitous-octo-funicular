manifestVersion: 1
id: archerbullseye-resell-tracker
name: Resell Tracker
tagline: Track retail arbitrage buys, sells, and profits
icon: https://raw.githubusercontent.com/ArcherBullseye/resell-tracker/main/umbrel-app-icon.jpg
category: Finance
version: "1.2.19"
port: 3001
description: >-
  Resell Tracker is a retail arbitrage management app that runs entirely on your Umbrel home server.


  Features:

  - Barcode / UPC lookup to auto-fill product name and image

  - eBay sold listings price data (low, average, high) with recent sales

  - Record buy price and buy date for every item

  - Record sell price, sell date, shipping cost, and selling platform

  - Platform fee calculation for eBay, Mercari, Poshmark, Facebook Marketplace, and more

  - Live net profit preview before saving

  - Dashboard with total invested, total revenue, and net profit across all sales

  - Filter by In Inventory vs. Sold

  - All data stored locally in SQLite — no cloud required


  API keys required for full functionality:

  - eBay Developer App ID (free) — for sold listing price data

  - UPC Item DB key (optional, free tier included) — for barcode lookup
developer: ArcherBullseye
website: https://github.com/ArcherBullseye/resell-tracker
submitter: ArcherBullseye
submission: https://github.com/ArcherBullseye/ubiquitous-octo-funicular
repo: https://github.com/ArcherBullseye/resell-tracker
support: https://github.com/ArcherBullseye/resell-tracker/issues
gallery:
  - https://raw.githubusercontent.com/ArcherBullseye/resell-tracker/main/umbrel-app-icon.jpg
releaseNotes: >-
  v1.2.19: Definitive Home Depot server-access test — it now warms up on the homepage, re-injects your cookies, and replays your browser's exact captured API request server-side (the call the scheduler would make), reporting the API HTTP status, product count, and response preview. New "Capture HD API request" bookmarklet grabs that request in one click.
dependencies: []
