releaseNotes: >-
  v1.3.2: Browser extension for free retailer scanning (Lowe's, TSC, HD, Walmart) — 1-click scan from clearance pages, products sent directly to your Resell Tracker over LAN with no cloud required. TSC Apify integration wired (store number field, keyword scan). Shelf badge now hidden on sold items (still editable in the Edit modal). Server-side import buffer with pending-import polling so products auto-appear when you return to the scanner tab.
