version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: archerbullseye-resell-tracker_server_1
      APP_PORT: 3000

  server:
    build: https://github.com/ArcherBullseye/resell-tracker.git
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - EBAY_APP_ID=${EBAY_APP_ID:-}
      - UPC_API_KEY=${UPC_API_KEY:-}
    restart: unless-stopped
