name: Build and push Solar Miner Docker image

on:
  push:
    branches: [master]
    paths:
      - 'archerbullseye-store-solar-miner/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./archerbullseye-store-solar-miner
          push: true
          tags: |
            ghcr.io/archerbullseye/solar-miner-app:latest
            ghcr.io/archerbullseye/solar-miner-app:${{ github.sha }}
