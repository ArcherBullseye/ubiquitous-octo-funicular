manifestVersion: 1
id: archerbullseye-store-solar-miner
name: Solar Miner
tagline: Control your Bitcoin miner with solar power
icon: https://raw.githubusercontent.com/ArcherBullseye/ubiquitous-octo-funicular/master/archerbullseye-store-solar-miner/icon.svg
category: bitcoin
version: "1.5.11"
port: 3000
description: >-
  Monitor your Solis solar inverter and automatically control your LuxOS
  Bitcoin miner based on battery state of charge.


  Features smart start mode using learned per-hour PV efficiency, weather
  forecasting, Telegram alerts, Luxor pool stats, and live BTC price.
  Fully configurable via the built-in web UI — no config files needed.


  Also controls a Tuya Wi-Fi dehumidifier based on humidity thresholds.
developer: ArcherBullseye
website: https://github.com/ArcherBullseye/ubiquitous-octo-funicular
submitter: ArcherBullseye
submission: https://github.com/ArcherBullseye/ubiquitous-octo-funicular
repo: https://github.com/ArcherBullseye/ubiquitous-octo-funicular
support: https://github.com/ArcherBullseye/ubiquitous-octo-funicular/issues
gallery:
  - https://raw.githubusercontent.com/ArcherBullseye/ubiquitous-octo-funicular/master/archerbullseye-store-solar-miner/icon.svg
releaseNotes: >-
  v1.5.11: Added a manual refresh button — hover the green status dot in the
  header and it grows to reveal a refresh icon; click it to make every data
  source (Solis, miner, weather, pool) re-poll immediately. The dot spins until
  the fresh reading lands.


  v1.5.10: Telegram notifications cleaned up. The "Good solar day ahead"
  forecast now sends once per day at 8am local time (configurable) instead of
  repeating. Upgrading the app no longer re-fires Smart Start, battery-low,
  battery-full, or sats-milestone alerts on restart. Sats milestones now reset
  per day. Fixed a duplicate alert when manually holding Smart Start.


  v1.5.9: Telegram bot now accepts commands — /startMiner, /stopMiner, and
  /info. /stopMiner disables the miner until local midnight (or until you
  start it again from Telegram or the dashboard); on/off confirmations are
  sent once the controller verifies the miner actually changed state. Only
  the configured chat can issue commands.


  v1.5.8: Weather box now shows a scrollable 10-hour forecast (up from 5)
  while keeping the same card size.


  v1.5.7: Daily Earnings chart now shows the last 8 settled days and excludes
  today, so the rolling 24-hour figure no longer bleeds yesterday's earnings
  onto today's bar.


  v1.5.6: Smart box now shows PV input in kW, turns each condition green
  when it's above its threshold, and adds a Hold button that pauses Smart
  Start until midnight (miner reverts to normal thresholds, then resumes).


  v1.5.5: Show app version in Settings panel header.


  v1.5.4: Fix sats tracking to use Luxor's real per-day revenue API
  instead of unreliable delta accumulation. Smart Start now requires a
  configurable minimum PV input (default 1000 W) before starting the
  miner, preventing midnight starts on sunny-day forecasts.


  v1.5.3: Add show/hide eye button to all sensitive fields (Solis API
  secret, dehumidifier local key, Luxor API key, Telegram bot token).
  Adds autocomplete=new-password to prevent browser autofill from
  silently overwriting saved credentials.


  v1.5.2: Fix dehumidifier local key being cleared by browser autofill.


  v1.5.1: Fix Loading screen after seasonal efficiency update.


  v1.5.0: Seasonal PV efficiency modeling — per-month efficiency curves
  (288 cells), radiation tracking, neighboring-month fallback, and
  efficiency chart month selector.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
